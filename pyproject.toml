[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["venv", "build", "dist"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle / pyflakes
    "I",             # isort
    "B",             # bugbear
    "UP",            # pyupgrade
    "C4",            # comprehensions
    "SIM",           # simplifications
]
ignore = [
    "E501",   # long lines (we set line-length=100 already; some strings exceed)
    "B008",   # function calls in defaults are fine for Qt enums
    "SIM117", # nested with statements are fine in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011", "F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]
